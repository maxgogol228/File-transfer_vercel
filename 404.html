<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>File Transfer Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
        }

        .redirect-container {
            text-align: center;
            padding: 40px;
            background: #0f1535;
            border-radius: 16px;
            border: 1px solid #1e2a4a;
            max-width: 400px;
            margin: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #1e2a4a;
            border-top-color: #4f9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h2 {
            color: #4f9eff;
            margin-bottom: 16px;
        }

        p {
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .redirect-link {
            color: #4f9eff;
            text-decoration: none;
            border: 1px solid #4f9eff;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .redirect-link:hover {
            background: #4f9eff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <h2>File Transfer Hub</h2>
        <div class="spinner"></div>
        <p>Redirecting to application...</p>
        <p id="countdown">3</p>
        <a href="/" class="redirect-link">Click here if not redirected</a>
    </div>

    <script>
        // Перенаправление на главную страницу
        let seconds = 3;
        const countdownEl = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = '/';
            }
        }, 1000);
        
        // Мгновенное перенаправление через 100мс (для быстрых соединений)
        setTimeout(() => {
            window.location.href = '/';
        }, 100);
    </script>
</body>
</html>
