<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>File Transfer Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-sidebar {
            width: 320px;
            background: #0f1535;
            border-left: 1px solid #1e2a4a;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #1e2a4a;
            background: #0a0e27;
        }

        .chat-header h3 {
            color: #4f9eff;
            font-size: 1.1rem;
        }

        .users-list {
            padding: 10px 16px;
            border-bottom: 1px solid #1e2a4a;
            font-size: 0.8rem;
            background: #0a0e27;
        }

        .users-list span {
            color: #10b981;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-message {
            background: #0a0e27;
            border-radius: 12px;
            padding: 10px 12px;
            max-width: 85%;
        }

        .chat-message.own {
            align-self: flex-end;
            background: linear-gradient(135deg, #4f9eff, #7c3aed);
        }

        .message-sender {
            font-size: 0.7rem;
            color: #9ca3af;
            margin-bottom: 4px;
        }

        .chat-message.own .message-sender {
            color: #c7d2fe;
        }

        .message-text {
            font-size: 0.9rem;
            word-break: break-word;
        }

        .message-time {
            font-size: 0.65rem;
            color: #6b7280;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid #1e2a4a;
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            background: #0a0e27;
            border: 1px solid #1e2a4a;
            border-radius: 24px;
            color: #e0e0e0;
            font-size: 0.9rem;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: #4f9eff;
        }

        .chat-input-area button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #4f9eff, #7c3aed);
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
        }

        .room-timer {
            background: #1e2a4a;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: monospace;
            white-space: nowrap;
        }

        .room-timer.warning {
            background: #dc2626;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            
            .chat-sidebar {
                width: 100%;
                height: 280px;
                border-left: none;
                border-top: 1px solid #1e2a4a;
            }
            
            .main-content {
                height: calc(100vh - 280px);
                padding: 12px;
            }
        }

        .container {
            max-width: 100%;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #0f1535 0%, #0a0e27 100%);
            border-bottom: 1px solid #1e2a4a;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #4f9eff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card {
            background: #0f1535;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1e2a4a;
        }

        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #4f9eff;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            padding: 14px 16px;
            background: #0a0e27;
            border: 1px solid #1e2a4a;
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 1rem;
        }

        .btn {
            padding: 12px 24px;
            background: #1e2a4a;
            border: none;
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f9eff, #7c3aed);
            color: white;
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-success {
            background: #10b981;
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .status {
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 0.9rem;
        }

        .status-info { background: #1e2a4a; color: #4f9eff; border-left: 3px solid #4f9eff; }
        .status-success { background: #064e3b; color: #10b981; border-left: 3px solid #10b981; }
        .status-error { background: #7f1d1d; color: #f87171; border-left: 3px solid #dc2626; }

        .drop-zone {
            border: 2px dashed #1e2a4a;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            background: #0a0e27;
            cursor: pointer;
        }

        .file-list {
            margin-top: 16px;
            max-height: 300px;
            overflow-y: auto;
        }

        .file-item {
            background: #0a0e27;
            border: 1px solid #1e2a4a;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .file-name {
            font-weight: 500;
            word-break: break-word;
        }

        .file-size {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1e2a4a;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f9eff, #7c3aed);
            transition: width 0.3s ease;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .room-info-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .room-key {
            font-family: monospace;
            font-size: 1.1rem;
            background: #0a0e27;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #4f9eff;
            color: #4f9eff;
        }

        .peer-count {
            background: #1e2a4a;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .leave-btn {
            background: #dc2626;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            white-space: nowrap;
            border: none;
            color: white;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1e2a4a;
        }

        .tab {
            padding: 10px 16px;
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
        }

        .tab.active {
            color: #4f9eff;
            border-bottom: 2px solid #4f9eff;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        @media (max-width: 768px) {
            .room-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .room-info-group {
                justify-content: space-between;
            }
            
            .room-key {
                font-size: 0.9rem;
                word-break: break-all;
            }
            
            .peer-count, .room-timer {
                font-size: 0.75rem;
            }
            
            .leave-btn {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-content">
            <div class="container">
                <div class="header">
                    <h1>FILE TRANSFER HUB</h1>
                </div>

                <div id="connectionPanel" class="card">
                    <h2>Join Room</h2>
                    <div class="input-group">
                        <input type="text" id="userNameInput" placeholder="Your nickname" maxlength="20" autocomplete="off">
                        <input type="text" id="roomKeyInput" placeholder="Room key" maxlength="20" autocomplete="off">
                        <button id="connectBtn" class="btn btn-primary">Join / Create</button>
                    </div>
                    <div id="serverUrlPanel" style="margin-top: 12px; font-size: 0.8rem; color: #6b7280;">
                        Server: <span id="serverUrlStatus">Connecting...</span>
                    </div>
                    <div id="connectionStatus"></div>
                </div>

                <div id="mainInterface" style="display: none;">
                    <div class="card">
                        <div class="room-header">
                            <div class="room-info-group">
                                <div>
                                    <div style="font-size: 0.7rem; color: #6b7280;">Room Key</div>
                                    <div class="room-key" id="currentRoomKey"></div>
                                </div>
                                <div class="peer-count" id="peerCount">Devices: 1</div>
                                <div class="room-timer" id="roomTimer">Expires: --:--</div>
                            </div>
                            <button id="leaveRoomBtn" class="leave-btn">Leave Room</button>
                        </div>
                    </div>

                    <div class="tabs">
                        <button class="tab active" data-tab="send">Send Files</button>
                        <button class="tab" data-tab="received">Received Files</button>
                    </div>

                    <div id="sendTab" class="tab-content active">
                        <div class="card">
                            <h2>Drop or Select Files</h2>
                            <div id="dropZone" class="drop-zone">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 3v12m0 0-3-3m3 3 3-3M5 17h14a2 2 0 0 1 2 2v2H3v-2a2 2 0 0 1 2-2z"/>
                                </svg>
                                <p>Tap or drag files here</p>
                            </div>
                            <input type="file" id="fileInput" multiple style="display: none;">
                        </div>

                        <div class="card">
                            <h2>My Uploads</h2>
                            <div id="uploadsList" class="file-list">No uploads</div>
                        </div>

                        <div class="card">
                            <h2>Available Files</h2>
                            <div id="availableFiles" class="file-list">No shared files</div>
                        </div>
                    </div>

                    <div id="receivedTab" class="tab-content">
                        <div class="card">
                            <h2>Downloaded Files</h2>
                            <div id="receivedFiles" class="file-list">No files downloaded yet</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-sidebar" id="chatSidebar" style="display: none;">
            <div class="chat-header">
                <h3>Room Chat</h3>
            </div>
            <div class="users-list" id="usersList">Users: <span>--</span></div>
            <div class="chat-messages" id="chatMessages">
                <div style="text-align: center; color: #6b7280; padding: 20px;">Join a room to start chatting</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Type a message..." maxlength="200">
                <button id="sendChatBtn">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        // ============ КОНФИГУРАЦИЯ - ЗАМЕНИТЕ НА ВАШ URL ОТ RENDER ============
        const SERVER_URL = 'https://file-transfer-02on.onrender.com'; // <--- ЗАМЕНИТЕ ЭТО!
        
        let socket = null;
        let currentRoomKey = null;
        let myUploads = new Map();
        let roomFiles = new Map();
        let downloadedFiles = [];
        let userName = '';
        let timerInterval = null;
        const CHUNK_SIZE = 16384;

        // DOM elements
        const connectBtn = document.getElementById('connectBtn');
        const userNameInput = document.getElementById('userNameInput');
        const roomKeyInput = document.getElementById('roomKeyInput');
        const connectionStatus = document.getElementById('connectionStatus');
        const serverUrlStatus = document.getElementById('serverUrlStatus');
        const connectionPanel = document.getElementById('connectionPanel');
        const mainInterface = document.getElementById('mainInterface');
        const currentRoomKeyEl = document.getElementById('currentRoomKey');
        const peerCountEl = document.getElementById('peerCount');
        const leaveRoomBtn = document.getElementById('leaveRoomBtn');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadsList = document.getElementById('uploadsList');
        const availableFilesDiv = document.getElementById('availableFiles');
        const receivedFilesDiv = document.getElementById('receivedFiles');
        const chatSidebar = document.getElementById('chatSidebar');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendChatBtn = document.getElementById('sendChatBtn');
        const roomTimer = document.getElementById('roomTimer');
        const usersList = document.getElementById('usersList');

        // Показать URL сервера
        serverUrlStatus.textContent = SERVER_URL;
        serverUrlStatus.style.color = '#4f9eff';

        function initSocket() {
            if (socket) {
                try { socket.disconnect(); } catch(e) {}
            }
            
            socket = io(SERVER_URL, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 10,
                reconnectionDelay: 1000,
                timeout: 10000
            });
            
            socket.on('connect', () => {
                console.log('Connected to server');
                showStatus('Connected to server', 'success');
                serverUrlStatus.style.color = '#10b981';
            });

            socket.on('connect_error', (error) => {
                console.error('Connection error:', error);
                showStatus(`Cannot connect to server: ${SERVER_URL}. Make sure server is running.`, 'error');
                serverUrlStatus.style.color = '#dc2626';
            });

            socket.on('disconnect', () => {
                console.log('Disconnected from server');
                showStatus('Disconnected from server', 'error');
                serverUrlStatus.style.color = '#f87171';
            });

            socket.on('peer-joined', (data) => {
                updatePeerCount(data.clientsCount);
                updateUsersList(data.users);
                addChatMessage({ userName: 'System', message: data.message, isSystem: true, timestamp: new Date().toISOString() });
            });

            socket.on('peer-left', (data) => {
                updatePeerCount(data.clientsCount);
                updateUsersList(data.users);
                addChatMessage({ userName: 'System', message: data.message, isSystem: true, timestamp: new Date().toISOString() });
            });

            socket.on('chat-message', (message) => {
                addChatMessage(message);
            });

            socket.on('chat-history', (messages) => {
                if (messages && messages.length) {
                    messages.forEach(msg => addChatMessage(msg));
                }
            });

            socket.on('file-available', (data) => {
                if (!roomFiles.has(data.fileId)) {
                    roomFiles.set(data.fileId, data);
                    renderAvailableFiles();
                    showStatus(`New file: ${data.fileName}`, 'success');
                    addChatMessage({ userName: 'System', message: `${data.senderName || 'User'} shared: ${data.fileName}`, isSystem: true, timestamp: new Date().toISOString() });
                }
            });

            socket.on('upload-progress', (data) => {
                if (myUploads.has(data.fileId)) {
                    const upload = myUploads.get(data.fileId);
                    upload.progress = data.progress;
                    if (data.progress >= 100) upload.status = 'complete';
                    renderUploadsList();
                }
            });

            socket.on('room-expired', (data) => {
                showStatus(data.message, 'error');
                setTimeout(() => leaveRoom(), 3000);
            });
        }

        function updateUsersList(users) {
            if (users && users.length) {
                const names = users.map(u => u.name).join(', ');
                usersList.innerHTML = `Users (${users.length}): <span>${escapeHtml(names)}</span>`;
            } else if (users) {
                usersList.innerHTML = `Users: <span>--</span>`;
            }
        }

        function connectToRoom() {
            const roomKey = roomKeyInput.value.trim();
            const nick = userNameInput.value.trim();
            
            if (!nick) {
                showStatus('Please enter your nickname', 'error');
                return;
            }
            if (!roomKey) {
                showStatus('Please enter a room key', 'error');
                return;
            }
            
            userName = nick;
            localStorage.setItem('lastUserName', userName);
            
            if (!socket || !socket.connected) {
                initSocket();
                setTimeout(() => performJoin(roomKey), 1000);
            } else {
                performJoin(roomKey);
            }
        }

        function performJoin(roomKey) {
            showStatus('Connecting to room...', 'info');
            
            socket.emit('join-room', { roomKey, userName }, (response) => {
                if (response && response.success) {
                    currentRoomKey = roomKey;
                    currentRoomKeyEl.textContent = roomKey;
                    updatePeerCount(response.clientsCount);
                    updateUsersList(response.users);
                    
                    if (response.files && response.files.length > 0) {
                        response.files.forEach(file => {
                            if (!roomFiles.has(file.fileId)) {
                                roomFiles.set(file.fileId, file);
                            }
                        });
                        renderAvailableFiles();
                    }
                    
                    connectionPanel.style.display = 'none';
                    mainInterface.style.display = 'block';
                    chatSidebar.style.display = 'flex';
                    
                    showStatus(`Connected to: ${roomKey}`, 'success');
                    setupFileTransfer();
                    startTimer(response.expiresIn);
                } else if (response && response.error === 'Room expired') {
                    showStatus('Room has expired (1 hour limit). Create a new room.', 'error');
                } else {
                    showStatus('Failed to connect to room. Make sure server is running.', 'error');
                }
            });
        }

        function startTimer(expiresInMs) {
            if (timerInterval) clearInterval(timerInterval);
            
            const updateTimer = () => {
                if (!currentRoomKey || !socket) return;
                socket.emit('get-room-info', (info) => {
                    if (info && info.expiresIn) {
                        const remaining = info.expiresIn;
                        if (remaining <= 0) {
                            roomTimer.textContent = 'Expired';
                            roomTimer.classList.add('warning');
                            if (timerInterval) clearInterval(timerInterval);
                        } else {
                            const minutes = Math.floor(remaining / 60000);
                            const seconds = Math.floor((remaining % 60000) / 1000);
                            roomTimer.textContent = `Expires: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                            if (remaining < 300000) {
                                roomTimer.classList.add('warning');
                            } else {
                                roomTimer.classList.remove('warning');
                            }
                        }
                    }
                });
            };
            
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function sendChatMessage(message) {
            if (!socket || !currentRoomKey) return;
            socket.emit('chat-message', { message: message });
        }

        function addChatMessage(message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message';
            
            const isOwn = message.userId === socket?.id;
            if (isOwn) messageDiv.classList.add('own');
            
            let timeStr = '';
            if (message.timestamp) {
                const date = new Date(message.timestamp);
                timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else {
                timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            
            const senderName = message.userName || (message.isSystem ? 'System' : 'User');
            
            messageDiv.innerHTML = `
                <div class="message-sender">${escapeHtml(senderName)}</div>
                <div class="message-text">${escapeHtml(message.message)}</div>
                <div class="message-time">${timeStr}</div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            while (chatMessages.children.length > 100) {
                chatMessages.removeChild(chatMessages.firstChild);
            }
        }

        function leaveRoom() {
            if (socket && currentRoomKey) {
                socket.emit('leave-room');
            }
            
            if (timerInterval) clearInterval(timerInterval);
            
            connectionPanel.style.display = 'block';
            mainInterface.style.display = 'none';
            chatSidebar.style.display = 'none';
            
            myUploads.clear();
            roomFiles.clear();
            downloadedFiles = [];
            
            roomKeyInput.value = '';
            chatMessages.innerHTML = '<div style="text-align: center; color: #6b7280; padding: 20px;">Join a room to start chatting</div>';
            
            showStatus('Left the room', 'info');
        }

        leaveRoomBtn.onclick = leaveRoom;

        function setupFileTransfer() {
            dropZone.onclick = () => fileInput.click();
            dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
            dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
            dropZone.ondrop = (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                uploadFiles(Array.from(e.dataTransfer.files));
            };
            fileInput.onchange = (e) => {
                uploadFiles(Array.from(e.target.files));
                fileInput.value = '';
            };
            
            sendChatBtn.onclick = () => {
                const msg = chatInput.value.trim();
                if (msg) {
                    sendChatMessage(msg);
                    chatInput.value = '';
                }
            };
            chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendChatBtn.click(); };
        }

        async function uploadFiles(files) {
            for (let file of files) {
                const fileId = generateFileId();
                myUploads.set(fileId, { id: fileId, fileName: file.name, fileSize: file.size, progress: 0, status: 'uploading' });
                renderUploadsList();
                socket.emit('file-upload-start', { fileId, fileName: file.name, fileSize: file.size, fileType: file.type });
                await uploadFileChunks(fileId, file);
            }
        }

        async function uploadFileChunks(fileId, file) {
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
            for (let chunkIndex = 0; chunkIndex < totalChunks; chunkIndex++) {
                const start = chunkIndex * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, file.size);
                const arrayBuffer = await readChunk(file.slice(start, end));
                
                socket.emit('file-chunk', { fileId, data: arrayBuffer, chunkIndex, totalChunks }, (response) => {
                    if (response?.success && myUploads.has(fileId)) {
                        myUploads.get(fileId).progress = response.progress;
                        renderUploadsList();
                    }
                });
                await new Promise(resolve => setTimeout(resolve, 5));
            }
        }

        function readChunk(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(blob);
            });
        }

        function downloadFile(fileId, fileName) {
            showStatus(`Downloading ${fileName}...`, 'info');
            socket.emit('download-file', { fileId }, (response) => {
                if (response && response.success) {
                    const binaryString = atob(response.fileData);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                    const blob = new Blob([bytes]);
                    const url = URL.createObjectURL(blob);
                    
                    downloadedFiles.push({ id: fileId, name: response.fileName, url, size: response.fileSize });
                    renderReceivedFiles();
                    showStatus(`Download complete: ${response.fileName}`, 'success');
                    
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = response.fileName;
                    document.body.appendChild(link);
                    link.click();
                    setTimeout(() => document.body.removeChild(link), 100);
                } else {
                    showStatus(`Download failed: ${response?.error || 'Unknown error'}`, 'error');
                }
            });
        }

        function renderUploadsList() {
            if (myUploads.size === 0) { uploadsList.innerHTML = '<div style="text-align: center; color: #6b7280; padding: 20px;">No uploads</div>'; return; }
            uploadsList.innerHTML = Array.from(myUploads.values()).map(u => `
                <div class="file-item">
                    <div class="file-name">${escapeHtml(u.fileName)}</div>
                    <div class="file-size">${formatBytes(u.fileSize)}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${u.progress}%"></div></div>
                    <div>${u.status === 'uploading' ? `${Math.round(u.progress)}%` : 'Complete'}</div>
                </div>
            `).join('');
        }

        function renderAvailableFiles() {
            const files = Array.from(roomFiles.values());
            if (files.length === 0) { availableFilesDiv.innerHTML = '<div style="text-align: center; color: #6b7280; padding: 20px;">No shared files</div>'; return; }
            availableFilesDiv.innerHTML = files.map(f => `
                <div class="file-item">
                    <div class="file-name">${escapeHtml(f.fileName)}</div>
                    <div class="file-size">${formatBytes(f.fileSize)}</div>
                    <button class="btn btn-primary btn-sm" onclick="window.downloadFileById('${f.fileId}', '${escapeHtml(f.fileName)}')">Download</button>
                </div>
            `).join('');
        }

        function renderReceivedFiles() {
            if (downloadedFiles.length === 0) { receivedFilesDiv.innerHTML = '<div style="text-align: center; color: #6b7280; padding: 20px;">No files downloaded yet</div>'; return; }
            receivedFilesDiv.innerHTML = downloadedFiles.map(f => `
                <div class="file-item">
                    <div class="file-name">${escapeHtml(f.name)}</div>
                    <div class="file-size">${formatBytes(f.size)}</div>
                    <button class="btn btn-success btn-sm" onclick="window.saveFileAgain('${f.url}', '${escapeHtml(f.name)}')">Save Again</button>
                </div>
            `).join('');
        }

        function updatePeerCount(count) { 
            peerCountEl.textContent = `Devices: ${count || 1}`; 
        }
        
        function showStatus(msg, type) { 
            const div = connectionStatus; 
            div.className = `status status-${type}`; 
            div.innerHTML = msg; 
            setTimeout(() => { 
                if (div.innerHTML === msg) div.innerHTML = ''; 
            }, 4000); 
        }
        
        function generateFileId() { return `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`; }
        
        function formatBytes(b) { 
            if (b === 0) return '0 Bytes'; 
            const k = 1024, sizes = ['Bytes', 'KB', 'MB', 'GB']; 
            const i = Math.floor(Math.log(b) / Math.log(k)); 
            return parseFloat((b / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i]; 
        }
        
        function escapeHtml(str) { 
            const div = document.createElement('div'); 
            div.textContent = str; 
            return div.innerHTML; 
        }

        window.downloadFileById = (fileId, fileName) => downloadFile(fileId, fileName);
        window.saveFileAgain = (url, filename) => { 
            const a = document.createElement('a'); 
            a.href = url; 
            a.download = filename; 
            document.body.appendChild(a); 
            a.click(); 
            setTimeout(() => document.body.removeChild(a), 100); 
        };

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}Tab`).classList.add('active');
            };
        });

        connectBtn.onclick = connectToRoom;
        roomKeyInput.onkeypress = (e) => { if (e.key === 'Enter') connectToRoom(); };
        userNameInput.onkeypress = (e) => { if (e.key === 'Enter') connectToRoom(); };
        
        const savedName = localStorage.getItem('lastUserName');
        if (savedName) userNameInput.value = savedName;

        // Показываем URL сервера и пробуем подключиться
        initSocket();
    </script>
</body>
</html>
